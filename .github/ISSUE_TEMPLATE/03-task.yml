name: 작업 정리
description: 리팩토링, 문서, 설정, 배포 등 일반 작업을 등록합니다.
title: "chore: "
labels: ["chore"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 타입
      options:
        - refactor
        - style
        - chore
        - docs
        - remove
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 작업 내용
      description: 어떤 작업을 할지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      placeholder: |
        - [ ] README 업데이트
        - [ ] 빌드 확인
        - [ ] PR 설명 작성
    validations:
      required: false
