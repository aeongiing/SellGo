name: 버그 수정
description: 동작 오류 또는 회귀를 제보합니다.
title: "fix: "
labels: ["fix"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생했는지 적어주세요.
      placeholder: 예) 대시보드에서 NOW 탭을 누르면 카드가 표시되지 않는다.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 다시 확인할 수 있는 순서를 적어주세요.
      placeholder: |
        1. /dashboard 접속
        2. NOW 탭 클릭
        3. 카드 목록 확인
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 로그 또는 스크린샷
      description: 콘솔 로그, 에러 메시지, 스크린샷이 있으면 붙여주세요.
      render: shell
    validations:
      required: false
